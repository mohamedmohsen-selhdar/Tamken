<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <rect width="64" height="64" rx="16" fill="#0a0a0a"/>
  <!-- Red glow backdrop -->
  <circle cx="32" cy="32" r="26" fill="url(#rg)" opacity="0.3"/>
  <!-- TAMKEN "T" mark — bold, industrial -->
  <text x="32" y="46" font-family="Arial Black, sans-serif" font-size="40" font-weight="900" text-anchor="middle" fill="url(#tg)" letter-spacing="-1">T</text>
  <!-- Thin accent underline -->
  <rect x="14" y="50" width="36" height="3" rx="1.5" fill="url(#lg)"/>
  <defs>
    <radialGradient id="rg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#7f1d1d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b91c1c" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>